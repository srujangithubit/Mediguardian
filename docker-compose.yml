version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: mediguardian_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    ports:
      - '5432:5432'
    volumes:
      - mediguardian_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mediguardian_redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - mediguardian_redisdata:/data
    command: redis-server --save 60 1 --loglevel warning

volumes:
  mediguardian_pgdata:
  mediguardian_redisdata:
